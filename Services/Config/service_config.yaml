# MQL5/Services/Config/service_config.yaml
# Python Companion Services 공통 설정
# 최초 실행 시 alert_service.py --setup 으로 텔레그램 설정 자동 입력

paths:
  root: "../../"
  macro_latest: "Files/live/macro_latest.csv"
  heartbeat: "Files/live/heartbeat.txt"
  trade_log: "Files/live/trade_log.csv"
  train_dataset: "Files/processed/AI_Study_Dataset.parquet"
  drift_report: "Files/live/drift_report.csv"
  performance_report: "Files/live/performance_report.csv"
  equity_curve: "Files/live/equity_curve.csv"
  alert_log: "Services/Logs/alert_log.csv"
  service_log: "Services/Logs/service.log"

telegram:
  bot_token: ""
  chat_id: ""
  alias: "BSP_Bot"
  enabled: false
  # 사용자 선택형 알림 (true/false)
  notify_entry: true
  notify_close: true
  notify_daily_pnl: true

macro_fetcher:
  fetch_days: 1500
  retry_count: 5
  retry_interval_min: 10
  # ──────────────────────────────────────────────────────────────
  # SHAP 선별 원본 심볼 (롱전략 기준)
  # ⚠️ 숏전략 추가 시 해당 모델의 SHAP 결과에 따라 심볼 추가 필수
  # ──────────────────────────────────────────────────────────────
  yf_symbols:
    - ["GC=F",      "GOLD",       "금 선물"]          # → GOLD_zscore_240, GOLD_slope
    - ["^GDAXI",    "DAX",        "독일 DAX"]         # → DAX_ret1d
    - ["KC=F",      "COFFEE",     "커피"]              # → COFFEE_accel
  fred_series:
    - ["DEXMXUS",   "MXUS_FR",    "USD/MXN 환율"]     # → MXUS_FR_ret1d

  # Sanity Check 규칙
  sanity_rules:
    GOLD:    {min: 500,    max: 10000, max_daily_pct: 10.0}
    DAX:     {min: 5000,   max: 100000,max_daily_pct: 15.0}
    COFFEE:  {min: 30,     max: 1000,  max_daily_pct: 20.0}
    MXUS_FR: {min: 10,     max: 40,    max_daily_pct: 10.0}

drift_monitor:
  psi_threshold: 0.25
  compare_days: 30
  bins: 10
  # SHAP Top-10 피처 (PSI 감시 대상)
  top_features:
    - "ADXS_adx_14_pct240"
    - "CE_SL2_dist_ATR"
    - "QQE_RSI_TrLevel"
    - "CHOP_Scale_slope14"
    - "BOP_Scale_zscore240"
    - "ADXMTF_M30_DiPlus"
    - "TickVol_ma_ratio_60"
    - "BSP_10_3_accel14"
    - "ADXS_diPlus_14_pct240"
    - "CE_Dist2_slope14"

schedule:
  macro_fetcher: "daily 22:00 UTC"
  drift_monitor: "weekly Saturday 12:00 UTC"
  performance_tracker: "daily 22:30 UTC"
